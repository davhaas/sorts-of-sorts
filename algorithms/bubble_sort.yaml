id: "bubble_sort"
name: "Bubble Sort"
complexity:
  best: "O(n)"
  average: "O(n^2)"
  worst: "O(n^2)"
runtime_behavior:
  sorted: "Best case: O(n). An optimized implementation breaks early if a full pass completes without a single swap."
  random: "Average case: O(n^2). Repeatedly stepping through the list, comparing adjacent elements, and swapping them."
  reversed: "Worst case: O(n^2). The array elements are in reverse order, forcing a swap at every single comparison."
description: >
  Repeatedly steps through the list, compares adjacent elements, and swaps them if they are in the wrong order. Large values 'bubble' to the top on each pass.
display_code:
  - "function bubbleSort(arr) {"
  - "  let n = arr.length;"
  - "  for (let i = 0; i < n - 1; i++) {"
  - "    let swapped = false;"
  - "    for (let j = 0; j < n - i - 1; j++) {"
  - "      if (arr[j] > arr[j + 1]) {"
  - "        let temp = arr[j];"
  - "        arr[j] = arr[j + 1];"
  - "        arr[j + 1] = temp;"
  - "        swapped = true;"
  - "      }"
  - "    }"
  - "    if (!swapped) break;"
  - "  }"
  - "  return arr;"
  - "}"
generator_code: >
  function* bubbleSort(arr) {
    let n = arr.length;
    yield { line: 1, vars: { n } };
    for (let i = 0; i < n - 1; i++) {
      let swapped = false;
      yield { line: 2, vars: { n, i, swapped } };
      for (let j = 0; j < n - i - 1; j++) {
        yield { line: 4, compare: [j, j + 1], vars: { n, i, j, swapped } };
        if (arr[j] > arr[j + 1]) {
          let temp = arr[j];
          arr[j] = arr[j + 1];
          arr[j + 1] = temp;
          yield { line: 5, swap: [j, j + 1], vars: { n, i, j, swapped } };
          swapped = true;
        }
      }
      yield { line: 12, vars: { n, i, swapped } };
      if (!swapped) {
        break;
      }
    }
    yield { line: 15, vars: { n } };
    return arr;
  }
