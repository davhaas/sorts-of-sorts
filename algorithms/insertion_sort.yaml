id: "insertion_sort"
name: "Insertion Sort"
complexity:
  best: "O(n)"
  average: "O(n^2)"
  worst: "O(n^2)"
runtime_behavior:
  sorted: "Best case: O(n). The inner loop terminates instantly for every item since no shifting is needed."
  random: "Average case: O(n^2). Shifting elements takes quadratic time on average."
  reversed: "Worst case: O(n^2). Maximum comparisons and shifts required as every element travels to index 0."
description: >
  Builds the final sorted array one item at a time by comparing each new element against the sorted section and inserting it into its correct position.
display_code:
  - "function insertionSort(arr) {"
  - "  let n = arr.length;"
  - "  for (let i = 1; i < n; i++) {"
  - "    let key = arr[i];"
  - "    let j = i - 1;"
  - "    while (j >= 0 && arr[j] > key) {"
  - "      arr[j + 1] = arr[j];"
  - "      j = j - 1;"
  - "    }"
  - "    arr[j + 1] = key;"
  - "  }"
  - "  return arr;"
  - "}"
generator_code: >
  function* insertionSort(arr) {
    let n = arr.length;
    yield { line: 2, vars: { n } };
    for (let i = 1; i < n; i++) {
      yield { line: 3, vars: { n, i } };
      let key = arr[i];
      yield { line: 4, vars: { n, i, key } };
      let j = i - 1;
      yield { line: 5, vars: { n, i, key, j } };
      while (true) {
        yield { line: 6, compare: j >= 0 ? [j] : [], vars: { n, i, key, j } };
        if (j >= 0 && arr[j] > key) {
          arr[j + 1] = arr[j];
          yield { line: 7, assign: [j + 1, arr[j]], vars: { n, i, key, j } };
          j = j - 1;
          yield { line: 8, vars: { n, i, key, j } };
        } else {
          break;
        }
      }
      arr[j + 1] = key;
      yield { line: 10, assign: [j + 1, key], vars: { n, i, key, j } };
    }
    yield { line: 12, vars: { n } };
    return arr;
  }