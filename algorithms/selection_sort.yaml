id: "selection_sort"
name: "Selection Sort"
complexity:
  best: "O(n^2)"
  average: "O(n^2)"
  worst: "O(n^2)"
runtime_behavior:
  sorted: "Best case: O(n^2). Even if the array is sorted, it must scan the remaining unsorted elements completely to find the minimum."
  random: "Average case: O(n^2). Consistently scans the remainder of the array to pull out the absolute smallest item element."
  reversed: "Worst case: O(n^2). Performs identical comparisons as the other states, though it executes maximum swap actions."
description: >
  Divides the input array into a sorted and an unsorted region. It repeatedly isolates the minimum element from the unsorted region and swaps it to the front.
display_code:
  - "function selectionSort(arr) {"
  - "  let n = arr.length;"
  - "  for (let i = 0; i < n - 1; i++) {"
  - "    let minIdx = i;"
  - "    for (let j = i + 1; j < n; j++) {"
  - "      if (arr[j] < arr[minIdx]) {"
  - "        minIdx = j;"
  - "      }"
  - "    }"
  - "    if (minIdx !== i) {"
  - "      let temp = arr[i];"
  - "      arr[i] = arr[minIdx];"
  - "      arr[minIdx] = temp;"
  - "    }"
  - "  }"
  - "  return arr;"
  - "}"
generator_code: >
  function* selectionSort(arr) {
    let n = arr.length;
    yield { line: 2, vars: { n } };
    for (let i = 0; i < n - 1; i++) {
      yield { line: 3, vars: { n, i } };
      let minIdx = i;
      yield { line: 4, vars: { n, i, minIdx } };
      for (let j = i + 1; j < n; j++) {
        yield { line: 5, vars: { n, i, minIdx, j } };
        yield { line: 6, compare: [j, minIdx], vars: { n, i, minIdx, j } };
        if (arr[j] < arr[minIdx]) {
          minIdx = j;
          yield { line: 7, vars: { n, i, minIdx, j } };
        }
      }
      yield { line: 10, vars: { n, i, minIdx } };
      if (minIdx !== i) {
        let temp = arr[i];
        yield { line: 11, vars: { n, i, minIdx, temp } };
        arr[i] = arr[minIdx];
        yield { line: 12, assign: [i, arr[minIdx]], vars: { n, i, minIdx, temp } };
        arr[minIdx] = temp;
        yield { line: 13, assign: [minIdx, temp], vars: { n, i, minIdx, temp } };
      }
    }
    yield { line: 16, vars: { n } };
    return arr;
  }